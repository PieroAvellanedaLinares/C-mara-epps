<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector EPP - Casco y Chaleco</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <h1>Detector EPP <span>casco blanco + chaleco naranja</span></h1>
  </header>

  <main>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="alerta" class="oculto"></div>
    </div>

    <aside id="panel">
      <h2>EPP STATUS</h2>
      <p id="p-personas">Personas: 0</p>
      <p id="p-casco" class="no">[NO] Casco blanco</p>
      <p id="p-chaleco" class="no">[NO] Chaleco naranja</p>
      <div id="estado-general" class="sin-persona">Sin persona</div>
      <button id="btn-start">Iniciar cámara</button>
      <p id="latencia"></p>
    </aside>
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
