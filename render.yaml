services:
  - type: web
    name: detector-epp
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --worker-class gthread --threads 4"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
